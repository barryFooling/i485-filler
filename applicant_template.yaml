# ============================================================
# I-485 Applicant Data Template — Refugee Adjustment of Status
# Field names verified against USCIS I-485 (edition 09/17/19)
# ============================================================
# HOW TO USE:
#   1. Confirm your PDF's exact field names:
#        python fill_i485.py list-fields blank_i485.pdf
#   2. Fill in values below, then run:
#        python fill_i485.py fill --input blank_i485.pdf \
#            --data applicant_template.yaml --output filled.pdf
#
# CHECKBOXES / RADIO BUTTONS:
#   Radio button pairs use [0] = Yes/first option, [1] = No/second option.
#   Set the one you want to true, the other to false.
#
# DATES: Use "MM/DD/YYYY" format (include quotes in YAML).
# ALIEN NUMBER: Include the leading "A" — e.g., "A123456789".
# ============================================================

# Rename any field key if your PDF version differs from the template.
field_overrides: {}

# ------------------------------------------------------------------
# PAGE 1 — Name, A-Number, VOLAG, DOB history
# (form1[0].#subform[0])
# ------------------------------------------------------------------
page1:
  # Current legal name
  "form1[0].#subform[0].Pt1Line1_FamilyName[0]": "LAST NAME"
  "form1[0].#subform[0].Pt1Line1_GivenName[0]": "FIRST NAME"
  "form1[0].#subform[0].Pt1Line1_MiddleName[0]": ""

  # Other names used — set 1
  "form1[0].#subform[0].Pt1Line2_FamilyName[0]": ""
  "form1[0].#subform[0].Pt1Line2_GivenName[0]": ""
  "form1[0].#subform[0].Pt1Line2_MiddleName[0]": ""

  # Other names used — set 2
  "form1[0].#subform[0].Pt1Line2a_FamilyName[0]": ""
  "form1[0].#subform[0].Pt1Line2a_GivenName[0]": ""
  "form1[0].#subform[0].Pt1Line2a_MiddleName[0]": ""

  # A-Number (on every page header — set it here; repeats handled below)
  "form1[0].#subform[0].AlienNumber[0]": "A000000000"

  # VOLAG resettlement agency number (if applicable)
  "form1[0].#subform[0].VolagNumber[0]": ""

  # USCIS Online Account Number
  "form1[0].#subform[0].USCISOnlineAcctNumber[0]": ""

  # Attorney bar number (leave blank if no attorney)
  "form1[0].#subform[0].AttorneyStateBarNumber[0]": ""

  # Date of birth (MM/DD/YYYY)
  "form1[0].#subform[0].Pt1Line3_DOB[0]": "01/01/1990"

  # Has the applicant used other dates of birth? [0]=Yes, [1]=No
  "form1[0].#subform[0].Pt1Line3_YN[0]": false
  "form1[0].#subform[0].Pt1Line3_YN[1]": true
  # If yes, list other DOBs here:
  "form1[0].#subform[0].Pt1Line3A_OtherDOB[0]": ""
  "form1[0].#subform[0].Pt1Line3B_OtherDOB[0]": ""

# ------------------------------------------------------------------
# PAGE 2 — Sex, country of birth/citizenship, I-94, entry info
# (form1[0].#subform[1])
# ------------------------------------------------------------------
page2:
  "form1[0].#subform[1].AlienNumber[1]": "A000000000"

  # Sex: [0]=Male, [1]=Female
  "form1[0].#subform[1].Pt1Line6_CB_Sex[0]": false
  "form1[0].#subform[1].Pt1Line6_CB_Sex[1]": true

  # Place of birth
  "form1[0].#subform[1].Pt1Line7_CityTownOfBirth[0]": "Addis Ababa"
  "form1[0].#subform[1].Pt1Line7_CountryOfBirth[0]": "Ethiopia"

  # Country of citizenship / nationality
  "form1[0].#subform[1].Pt1Line8_CountryofCitizenshipNationality[0]": "Ethiopia"

  # USCIS Online Account Number (repeated)
  "form1[0].#subform[1].Pt1Line9_USCISAccountNumber[0]": ""

  # Prior A-Number or pending petition — [0]=Yes, [1]=No
  "form1[0].#subform[1].Pt1Line4_YN[0]": false
  "form1[0].#subform[1].Pt1Line4_YN[1]": true
  "form1[0].#subform[1].Pt1Line4_AlienNumber[0]": ""

  # Other A-Numbers — [0]=Yes, [1]=No
  "form1[0].#subform[1].Pt1Line5_YN[0]": false
  "form1[0].#subform[1].Pt1Line5_YN[1]": true
  "form1[0].#subform[1].Pt1Line5A_ANumber[0]": ""
  "form1[0].#subform[1].Pt1Line5B_ANumber[0]": ""

  # Last arrival info
  "form1[0].#subform[1].Pt1Line10_DateofArrival[0]": "01/15/2024"
  "form1[0].#subform[1].Pt1Line10_CityTown[0]": "New York"
  # State dropdown (two-letter code, e.g. "NY")
  "form1[0].#subform[1].Pt1Line10_State[0]": "NY"
  # Last admitted as (write status, e.g. "Refugee")
  "form1[0].#subform[1].Pt1Line11_Admitted[0]": "Refugee"
  "form1[0].#subform[1].Pt1Line11_Paroled[0]": ""
  "form1[0].#subform[1].Pt1Line11_Other[0]": ""
  # I-94 expiration or "D/S"
  "form1[0].#subform[1].Pt1Line10_ExpDate[0]": "D/S"
  # Nonimmigrant visa number and passport info (leave blank if entered as refugee)
  "form1[0].#subform[1].Pt1Line10_VisaNum[0]": ""
  "form1[0].#subform[1].Pt1Line10_PassportNum[0]": ""
  "form1[0].#subform[1].Pt1Line10_Passport[0]": ""
  "form1[0].#subform[1].Pt1Line10_NonImmDate[0]": ""

